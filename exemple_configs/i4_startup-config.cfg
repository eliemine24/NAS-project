!

!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
!
hostname PE2
!
boot-start-marker
boot-end-marker
!
!
vrf definition BAS
 rd 100:120
 route-target export 100:2000
 route-target import 100:2000
 !
 address-family ipv4
 exit-address-family
!
vrf definition HAUT
 rd 100:110
 route-target export 100:1000
 route-target import 100:1000
 !
 address-family ipv4
 exit-address-family
!
!
no aaa new-model
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
!
!
no ip domain lookup
no ipv6 cef
!
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
!
!
!
!
!
!
!
interface Loopback1
 ip address 5.5.5.4 255.255.255.255
 ip ospf 4 area 23
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex full
!
interface GigabitEthernet1/0
 ip address 1.1.1.10 255.255.255.252
 ip ospf 4 area 23
 negotiation auto
 mpls ip
!
interface GigabitEthernet2/0
 vrf forwarding HAUT
 ip address 1.1.4.2 255.255.255.0
 negotiation auto
!
interface GigabitEthernet3/0
 vrf forwarding BAS
 ip address 1.1.5.2 255.255.255.0
 negotiation auto
!
router ospf 4
!
router bgp 1234
 bgp router-id 4.4.4.4
 bgp log-neighbor-changes
 neighbor 5.5.5.1 remote-as 1234
 neighbor 5.5.5.1 update-source Loopback1
 !
 address-family vpnv4
  neighbor 5.5.5.1 activate
  neighbor 5.5.5.1 send-community both
 exit-address-family
 !
 address-family ipv4 vrf BAS
  neighbor 1.1.5.1 remote-as 50
  neighbor 1.1.5.1 activate
 exit-address-family
 !
 address-family ipv4 vrf HAUT
  neighbor 1.1.4.1 remote-as 40
  neighbor 1.1.4.1 activate
 exit-address-family
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
!
!
control-plane
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
